                        <span class="detail-label">Resolution</span>
                        <span class="detail-value" id="panelResolution">Mobile</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Format</span>
                        <span class="detail-value" id="panelFormat">PNG</span>
                    </div>
                </div>
                <div class="hashtags" id="panelTags"></div>
                <button class="download-btn" id="panelDownload" type="button">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Download Wallpaper
                </button>
            </div>
        </div>
    </div>

    <script src="wallpapers-data.js"></script>
    <script src="wallpaper-pages.js"></script>
    <script src="download-tracking.js"></script>
    <script>
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        const mouse = { x: null, y: null };
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            createParticles();
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.25;
                this.vy = (Math.random() - 0.5) * 0.25;
                this.size = Math.random() * 1.6 + 0.4;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.28)';
                ctx.fill();
            }
        }

        function createParticles() {
            particles = [];
            const count = Math.min(70, Math.floor((canvas.width * canvas.height) / 18000));
            for (let i = 0; i < count; i++) particles.push(new Particle());
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        resizeCanvas();
        animateParticles();

        const configuredCategories = window.PMW_WALLPAPER_CATEGORIES || [];
        const wallpapers = window.PMW_WALLPAPERS || [];
        const randomizedWallpapers = shuffleWallpapers(wallpapers);
        const requestedCategory = new URLSearchParams(window.location.search).get('category');
        const availableCategories = new Set([
            ...configuredCategories,
            ...wallpapers.map(item => item.category).filter(Boolean)
        ]);
        let activeCategory = requestedCategory && availableCategories.has(requestedCategory)
            ? requestedCategory
            : 'All';
        let searchQuery = '';

        const grid = document.getElementById('wallpapersGrid');
        const filters = document.getElementById('categoryFilters');
        const count = document.getElementById('wallpaperCount');
        const search = document.getElementById('wallpaperSearch');
        const panel = document.getElementById('wallpaperPanel');
        const panelClose = document.getElementById('panelClose');
        const panelDownload = document.getElementById('panelDownload');
        let selectedWallpaper = null;

        const categoryDisplayLabels = {
            All: 'All Wallpapers',
            AMOLED: 'AMOLED Wallpapers',
            Anime: 'Anime Wallpapers',
            Nature: 'Nature Wallpapers',
            Romantic: 'Romantic Wallpapers'
        };

        function getCategoryLabel(category) {
            return categoryDisplayLabels[category] || category;
        }

        function updateCategorySeo(category) {
            const subject = category === 'All' ? 'PMW Visuals' : category;
            const pageTitle = category === 'All'
                ? 'PMW Wallpapers - Mobile Wallpapers'
                : `${category} Wallpapers - Free HD Downloads | PMW Visuals`;
            let description = `Download high-quality ${subject} wallpapers for mobile and desktop. Free HD wallpaper from PMW Visuals.`;

            if (description.length < 120) {
                description += ' Free to download and enjoy.';
            }

            document.title = pageTitle;
            document.querySelector('meta[name="description"]').setAttribute('content', description);
        }

        updateCategorySeo(activeCategory);

        function normalize(value) {
            return String(value || '').toLowerCase().trim();
        }

        function shuffleWallpapers(items) {
            const shuffled = [...items];
            for (let index = shuffled.length - 1; index > 0; index -= 1) {
                const randomIndex = Math.floor(Math.random() * (index + 1));
                [shuffled[index], shuffled[randomIndex]] = [shuffled[randomIndex], shuffled[index]];
            }
            return shuffled;
        }

        function slugifyTitle(value) {
            const slug = String(value || '')
                .toLowerCase()
                .replace(/&/g, ' and ')
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '')
                .replace(/-{2,}/g, '-');
            return slug || 'pmw-wallpaper';
        }

        function shortSlugId(value) {
            return String(value || '')
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '')
                .slice(-8) || 'image';
        }

        function buildWallpaperPageUrls(items) {
            const baseSlugs = items.map(item => slugifyTitle(item.title));
            const counts = new Map();
            baseSlugs.forEach(slug => counts.set(slug, (counts.get(slug) || 0) + 1));

            const used = new Set();
            const urls = {};
            items.forEach((item, index) => {
                const base = baseSlugs[index];
                let slug = counts.get(base) > 1 ? `${base}-${shortSlugId(item.id)}` : base;
                let suffix = 2;
                while (used.has(slug)) {
                    slug = `${base}-${shortSlugId(item.id)}-${suffix}`;
                    suffix += 1;
                }
                used.add(slug);
                urls[item.id] = `wallpapers/${slug}.html`;
            });
            return urls;
        }

        const wallpaperPageUrls = buildWallpaperPageUrls(wallpapers);

        function getWallpaperPageUrl(item) {
            return (window.PMW_WALLPAPER_PAGES && window.PMW_WALLPAPER_PAGES[item.id])
                || wallpaperPageUrls[item.id]
                || 'pmw-wallpapers.html';
        }

        function renderFilters() {
            const categories = [
                'All',
                ...Array.from(new Set([
                    ...configuredCategories,
                    ...randomizedWallpapers.map(item => item.category).filter(Boolean)
                ])).sort()
            ];
            filters.innerHTML = categories.map(category => `
                <button class="filter-chip ${category === activeCategory ? 'active' : ''}" data-category="${category}">${getCategoryLabel(category)}</button>
            `).join('');
        }

        function getFilteredWallpapers() {
            const q = normalize(searchQuery);
            return randomizedWallpapers.filter(item => {
                const categoryMatch = activeCategory === 'All' || item.category === activeCategory;
                const searchText = normalize([item.title, item.description, item.category, ...(item.tags || [])].join(' '));
                return categoryMatch && (!q || searchText.includes(q));
            });
        }

        function renderWallpapers() {
            const items = getFilteredWallpapers();
            count.textContent = items.length;
            if (!items.length) {
                const message = wallpapers.length
                    ? 'No wallpapers found. Try another search or category.'
                    : 'No wallpapers loaded yet. Add Cloudinary assets to wallpapers-data.js to populate this page.';
                grid.innerHTML = `<div class="empty-state">${message}</div>`;
                return;
            }
            grid.innerHTML = items.map(item => `
                <a class="wallpaper-card" data-id="${item.id}" href="${getWallpaperPageUrl(item)}">
                    <div class="wallpaper-thumb">
                        <img src="${item.thumbnail}" alt="${item.title}" loading="lazy">
                        <span class="wallpaper-hd-badge">HD</span>
                    </div>
                    <div class="wallpaper-card-info">
                        <h3 class="wallpaper-card-title">${item.title}</h3>
                        <div class="wallpaper-card-meta">
                            <span class="mini-tag">${getCategoryLabel(item.category)}</span>
                            <span class="mini-tag">9:16</span>
                        </div>
                    </div>
                </a>
            `).join('');
        }

        function openPanel(id) {
            const item = randomizedWallpapers.find(wallpaper => wallpaper.id === id);
            if (!item) return;
            selectedWallpaper = item;
            document.getElementById('panelImage').src = item.preview;
            document.getElementById('panelImage').alt = item.title;
            document.getElementById('panelCategory').textContent = getCategoryLabel(item.category);
            document.getElementById('panelTitle').textContent = item.title;
            document.getElementById('panelDescription').textContent = item.description;
            document.getElementById('panelResolution').textContent = item.resolution;
            document.getElementById('panelFormat').textContent = item.format || 'Image';
            document.getElementById('panelTags').innerHTML = (item.tags || []).map(tag => `<span class="hashtag">#${tag}</span>`).join('');
            panel.classList.add('active');
            document.body.classList.add('panel-open');
        }

        function closePanel() {
            panel.classList.remove('active');
            document.body.classList.remove('panel-open');
            selectedWallpaper = null;
        }

        function getRandomDownloadName() {
            const randomNumber = Math.floor(10000 + Math.random() * 90000);
            return `PMW_Wallpapers_${randomNumber}`;
        }

        function getNamedDownloadUrl(url) {
            const downloadName = getRandomDownloadName();
            return String(url || '').replace('/fl_attachment/', `/fl_attachment:${downloadName}/`);
        }

        filters.addEventListener('click', event => {
            const button = event.target.closest('.filter-chip');
            if (!button) return;
            activeCategory = button.dataset.category;
            renderFilters();
            renderWallpapers();
        });

        search.addEventListener('input', event => {
            searchQuery = event.target.value;
            renderWallpapers();
        });

        panelDownload.addEventListener('click', () => {
            if (!selectedWallpaper) return;
            if (window.PMW_DOWNLOAD_TRACKING) {
                window.PMW_DOWNLOAD_TRACKING.trackDownload({
                    id: selectedWallpaper.id,
                    title: selectedWallpaper.title,
                    category: getCategoryLabel(selectedWallpaper.category),
                    url: location.href,
                    type: 'wallpaper'
                });
            }
            window.location.href = getNamedDownloadUrl(selectedWallpaper.download);
        });

        panelClose.addEventListener('click', closePanel);
        panel.addEventListener('click', event => {
            if (event.target === panel) closePanel();
        });
        document.addEventListener('keydown', event => {
            if (event.key === 'Escape') closePanel();
        });
        window.addEventListener('scroll', () => {
            document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 30);
        });

        renderFilters();
        renderWallpapers();
    </script>
    <script src="consent.js" defer></script>
</body>
</html>
