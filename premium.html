<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pricing - PMW Visuals</title>
  <meta name="description" content="Choose a PMW Visuals plan with localized Paddle pricing for wallpapers, converter tools, and creative assets." />
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="shortcut icon" href="/favicon.png">
  <link rel="stylesheet" href="css/pmw-auth.css?v=20260718-live-plans" />
</head>
<body class="pmw-auth-page">
  <nav class="pmw-auth-nav">
    <a class="pmw-brand" href="index.html"><img class="pmw-brand-wordmark" src="pmw-wordmark.png" alt="PMW"><span>Visuals</span></a>
    <div class="pmw-nav-links"><a href="index.html">Home</a><a href="account.html">Account</a><a href="premium-wallpapers.html">Premium Wallpapers</a></div>
  </nav>
  <main class="pmw-pricing-shell">
    <section class="pmw-pricing-head">
      <div class="pmw-kicker">Premium Access</div>
      <h1>Choose your plan</h1>
      <p id="premiumStatus" class="pmw-sub" aria-live="polite"></p>
      <div class="pmw-plan-toggle" aria-label="Billing cycle">
        <button type="button" class="is-active" data-frequency="monthly">Monthly</button>
        <button type="button" data-frequency="yearly">Yearly</button>
      </div>
    </section>

    <section class="pmw-pricing-grid" id="pricingGrid" aria-label="PMW Visuals plans">
    </section>

    <section class="pmw-pricing-notes" aria-label="Premium notes">
      <div><strong>Secure payments</strong><span>Encrypted &amp; secure</span></div>
      <div><strong>Cancel anytime</strong><span>No hidden fees</span></div>
      <div><strong>Need help?</strong><span>We're here for you</span></div>
    </section>

    <p class="pmw-message" id="premiumMessage" aria-live="polite"></p>
  </main>
  <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
  <script type="module" src="js/premium.js?v=20260718-success"></script>
</body>
</html>
